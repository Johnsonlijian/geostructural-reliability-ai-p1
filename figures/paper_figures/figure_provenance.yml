Fig1_hero_mechanism:
  title: Mechanism-anchored validation protocol (single schematic figure)
  data_sources:
  - data/fig1_key_values.yml
  scripts:
  - src/build_manuscript_figures.py
  outputs:
  - output/svg/Fig1_hero_mechanism.svg
  - output/pdf/Fig1_hero_mechanism.pdf
  - output/pptx/Fig1_hero_mechanism_preview.pptx
  - output/png/Fig1_hero_mechanism.png
  generated_by: deterministic Python scripts
  generative_ai_image: false
  machine_checked: true
  style: publication (white background, thin axes, no card/poster elements); Fig.
    1 is the single schematic figure
  author_signoff: pending before submission
  notes: PPTX is a PNG preview slide, not a fully editable vector source. SVG/PDF
    plus scripts and source data are canonical.
